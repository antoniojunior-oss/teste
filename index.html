<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Dealer Pro — Sandbox</title>
  <!-- Importando a SDK do Google Generative AI -->
  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <!-- O CSS permanece o mesmo que você já tem, omiti aqui para focar na lógica -->
  <style>
    /* Mantenha seus estilos originais aqui */
    :root { --blue-900: #0a1628; --blue-500: #1d4ed8; --accent: #38bdf8; --white: #ffffff; }
    body { font-family: 'DM Sans', sans-serif; background: var(--blue-900); color: var(--white); margin: 0; }
    /* ... (restante do seu CSS) ... */
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Mantenha sua estrutura de HTML original (Nav, Sidebar, Sandbox) -->
  <!-- ... (Mesmo HTML que você enviou antes) ... -->
</div>

<script type="module">
  import { GoogleGenerativeAI } from "@google/generative-ai";

  // --- ESTADO DO APP ---
  const state = {
    url: '',
    htmlSource: '',
    appliedScripts: '',
    apiKey: localStorage.getItem('gemini_api_key') || '',
    isProcessing: false
  };

  // --- ELEMENTOS ---
  const $ = id => document.getElementById(id);
  const urlInput = $('urlInput');
  const apiKeyInput = $('apiKey');
  const promptInput = $('promptInput');
  const sandboxFrame = $('sandboxFrame');
  const codeOutput = $('codeOutput');
  const statusDot = $('statusDot');

  // --- INICIALIZAÇÃO ---
  if (state.apiKey) {
    apiKeyInput.value = state.apiKey;
    updateApiStatus();
  }

  // --- LÓGICA DA API KEY ---
  apiKeyInput.addEventListener('input', (e) => {
    state.apiKey = e.target.value.trim();
    localStorage.setItem('gemini_api_key', state.apiKey);
    updateApiStatus();
  });

  function updateApiStatus() {
    if (state.apiKey.length > 20) {
      statusDot.classList.add('active');
      $('apiStatus').innerHTML = '<span style="color:#22c55e">● Chave pronta</span>';
    } else {
      statusDot.classList.remove('active');
      $('apiStatus').innerHTML = '<span>● Aguardando chave...</span>';
    }
  }

  // --- CLONAGEM (Via Proxy) ---
  // Nota: O JS no navegador não pode clonar sites diretamente (CORS). 
  // Usaremos um serviço de proxy gratuito para demonstração.
  $('cloneBtn').addEventListener('click', async () => {
    const url = urlInput.value.trim();
    if (!url) return alert("Insira uma URL");

    showOverlay("Capturando site...", "Aguarde enquanto buscamos o HTML...");
    
    try {
      // Usando o AllOrigins como proxy para burlar o CORS
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const response = await fetch(proxyUrl);
      const data = await response.json();
      
      state.htmlSource = cleanHTML(data.contents);
      state.url = url;
      
      renderSandbox();
      hideOverlay();
      toast("Site clonado com sucesso!", "success");
    } catch (err) {
      hideOverlay();
      alert("Erro ao clonar: " + err.message);
    }
  });

  function cleanHTML(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    // Remove scripts pesados/trackers
    const remove = doc.querySelectorAll('script, iframe, ins');
    remove.forEach(el => el.remove());
    return doc.body.innerHTML;
  }

  // --- LÓGICA DA IA (Gemini JS SDK) ---
  $('applyBtn').addEventListener('click', async () => {
    if (!state.apiKey) return alert("Insira a API Key");
    if (!state.htmlSource) return alert("Clone um site primeiro");

    const promptUser = promptInput.value.trim();
    showOverlay("IA Pensando...", "Gerando código otimizado...");

    try {
      const genAI = new GoogleGenerativeAI(state.apiKey);
      const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

      const promptSystem = `
        Atue como Desenvolvedor Front-end Sênior. 
        CONTEXTO HTML: ${state.htmlSource.substring(0, 5000)}
        PEDIDO: ${promptUser}
        REGRAS: Retorne APENAS o código (CSS em <style> e JS em <script>). Sem explicações.
      `;

      const result = await model.generateContent(promptSystem);
      const response = await result.response;
      let code = response.text().replace(/```html|```javascript|```css|```/g, "").trim();
      
      state.appliedScripts = code;
      renderSandbox();
      updateCodePanel();
      hideOverlay();
      toast("Alterações aplicadas!", "success");
    } catch (err) {
      hideOverlay();
      alert("Erro na IA: " + err.message);
    }
  });

  // --- RENDERIZAÇÃO ---
  function renderSandbox() {
    const template = `
      <html>
        <head>
          <base href="${state.url}/">
          <style>body{margin:0}</style>
        </head>
        <body>
          ${state.htmlSource}
          ${state.appliedScripts}
        </body>
      </html>
    `;
    const blob = new Blob([template], { type: 'text/html' });
    sandboxFrame.src = URL.createObjectURL(blob);
    sandboxFrame.style.display = "block";
    $('sandboxEmpty').style.display = "none";
  }

  function updateCodePanel() {
    codeOutput.innerHTML = `<pre>${state.appliedScripts.replace(/</g, "&lt;")}</pre>`;
  }

  // --- UI HELPERS ---
  function showOverlay(t, s) { 
    $('overlayTitle').innerText = t; 
    $('overlaySub').innerText = s; 
    $('loadingOverlay').classList.add('show'); 
  }
  function hideOverlay() { $('loadingOverlay').classList.remove('show'); }
  function toast(msg, type) { console.log(msg); } // Simplificado para o exemplo
</script>
</body>
</html>
